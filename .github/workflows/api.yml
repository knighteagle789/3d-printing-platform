name: API — Build, Test & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'src/api/**'
      - '.github/workflows/api.yml'
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: '10.0.x'
  API_PROJECT: 'src/api/PrintHub.API/PrintHub.API.csproj'
  TEST_PROJECT: 'src/api/PrintHub.Tests/PrintHub.Tests.csproj'

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/packages.lock.json', '**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore dependencies
        run: dotnet restore ${{ env.API_PROJECT }}

      - name: Restore test dependencies
        run: dotnet restore ${{ env.TEST_PROJECT }}

      - name: Build
        run: dotnet build ${{ env.API_PROJECT }} --no-restore --configuration Release

      - name: Test
        run: >
          dotnet test ${{ env.TEST_PROJECT }}
          --configuration Release
          --logger "trx;LogFileName=test-results.trx"
          --collect:"XPlat Code Coverage"
          -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: src/api/**/TestResults/*.trx

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: src/api/**/TestResults/**/coverage.cobertura.xml

  # ── Deploy to Staging ───────────────────────────────────────────────────────
  # Runs automatically on every merge to main — only when API files changed.
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish
        run: >
          dotnet publish src/api/PrintHub.API/PrintHub.API.csproj
          --configuration Release
          --runtime linux-x64
          --self-contained false
          --output ./publish

      - name: Deploy to Azure Web App (Staging)
        uses: azure/webapps-deploy@v3
        with:
          app-name: noco-make-lab-api-dev
          publish-profile: ${{ secrets.AZURE_API_PUBLISH_PROFILE }}
          package: ./publish

  # ── Deploy to Production ────────────────────────────────────────────────────
  # Requires manual approval in GitHub (Settings → Environments → production).
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish
        run: >
          dotnet publish src/api/PrintHub.API/PrintHub.API.csproj
          --configuration Release
          --runtime linux-x64
          --self-contained false
          --output ./publish

      - name: Deploy to Azure Web App (Production)
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_API_APP_NAME_PROD }}
          publish-profile: ${{ secrets.AZURE_API_PUBLISH_PROFILE_PROD }}
          package: ./publish