name: Web — Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'src/web/**'
      - '.github/workflows/web.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/web/**'
      - '.github/workflows/web.yml'

env:
  NODE_VERSION: '22.x'
  WEB_PATH: 'src/web'

jobs:
  build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ env.WEB_PATH }}

      - name: Lint
        run: npm run lint
        working-directory: ${{ env.WEB_PATH }}

      - name: Build
        run: npm run build
        working-directory: ${{ env.WEB_PATH }}
        env:
          # Build-time env vars — real values are set in Azure Static Web Apps config.
          # Dummy values here prevent the build from failing on missing vars.
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'https://placeholder.example.com/api' }}

  # ── Deploy ─────────────────────────────────────────────────────────────────
  # Uncomment this job once Azure Static Web Apps is provisioned and the
  # deployment token secret is added to the repo (Settings → Secrets → Actions):
  #
  #   Secret name: AZURE_STATIC_WEB_APPS_API_TOKEN
  #   Value: deployment token from Azure Portal → Static Web App → Manage deployment token
  #
  deploy:
    name: Deploy to Azure Static Web Apps
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
  
    steps:
      - name: Checkout
        uses: actions/checkout@v4
  
      - name: Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: /src/web
          api_location: ''
          output_location: .next