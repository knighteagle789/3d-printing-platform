name: Infrastructure — Validate & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'infrastructure/**'
      - '.github/workflows/infra.yml'
  pull_request:
    branches: [main]
    paths:
      - 'infrastructure/**'
      - '.github/workflows/infra.yml'

env:
  RESOURCE_GROUP: rg-noco-make-lab-dev
  STACK_NAME: noco-make-lab-dev
  TEMPLATE: infrastructure/main.bicep
  PARAMS: infrastructure/main.bicepparam

jobs:
  # ── Validate (runs on PRs) ──────────────────────────────────────────────────
  # Shows exactly what will change before it changes — like terraform plan.
  validate:
    name: Validate & What-If
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install Bicep
        run: az bicep install

      - name: Bicep Build (lint)
        run: az bicep build --file ${{ env.TEMPLATE }}

      - name: What-If Preview
        run: |
          az deployment group what-if \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --template-file ${{ env.TEMPLATE }} \
            --parameters ${{ env.PARAMS }} \
            --parameters \
              dbAdminPassword="${{ secrets.DB_ADMIN_PASSWORD }}" \
              jwtKey="${{ secrets.JWT_KEY }}" \
              resendApiKey="${{ secrets.RESEND_API_KEY }}" \
              stripeSecretKey="${{ secrets.STRIPE_SECRET_KEY }}" \
              stripeWebhookSecret="${{ secrets.STRIPE_WEBHOOK_SECRET }}"

  # ── Deploy (runs on push to main only) ─────────────────────────────────────
  # Uses Deployment Stacks so removed resources are automatically cleaned up
  # and denyDelete prevents accidental manual changes in the portal.
  deploy:
    name: Deploy Stack
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install Bicep
        run: az bicep install

      - name: Deploy Stack
        run: |
          az stack group create \
            --name ${{ env.STACK_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --template-file ${{ env.TEMPLATE }} \
            --parameters ${{ env.PARAMS }} \
            --parameters \
              dbAdminPassword="${{ secrets.DB_ADMIN_PASSWORD }}" \
              jwtKey="${{ secrets.JWT_KEY }}" \
              resendApiKey="${{ secrets.RESEND_API_KEY }}" \
              stripeSecretKey="${{ secrets.STRIPE_SECRET_KEY }}" \
              stripeWebhookSecret="${{ secrets.STRIPE_WEBHOOK_SECRET }}" \
            --deny-settings-mode denyDelete \
            --action-on-unmanage deleteResources \
            --yes

      - name: Show Stack Outputs
        run: |
          az stack group show \
            --name ${{ env.STACK_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "outputs" \
            --output table