name: Infrastructure — Validate & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'infrastructure/**'
      - '.github/workflows/infra.yml'
  pull_request:
    branches: [main]

env:
  RESOURCE_GROUP: rg-noco-make-lab-dev
  STACK_NAME: noco-make-lab-dev
  TEMPLATE: infrastructure/main.bicep
  PARAMS: infrastructure/main.bicepparam

jobs:
  # ── Validate (runs on all PRs) ──────────────────────────────────────────────
  validate:
    name: Validate & What-If
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install Bicep
        run: az bicep install

      - name: Bicep Build (lint)
        run: az bicep build --file ${{ env.TEMPLATE }}

      - name: What-If Preview
        run: |
          az deployment group what-if \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --template-file ${{ env.TEMPLATE }} \
            --parameters ${{ env.PARAMS }} \
            --parameters \
              dbAdminPassword="${{ secrets.DB_ADMIN_PASSWORD }}" \
              jwtKey="${{ secrets.JWT_KEY }}" \
              resendApiKey="${{ secrets.RESEND_API_KEY }}" \
              stripeSecretKey="${{ secrets.STRIPE_SECRET_KEY }}" \
              stripeWebhookSecret="${{ secrets.STRIPE_WEBHOOK_SECRET }}"

  # ── Deploy to Staging ───────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy Stack (Staging)
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install Bicep
        run: az bicep install

      - name: Deploy Stack
        run: |
          az stack group create \
            --name ${{ env.STACK_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --template-file ${{ env.TEMPLATE }} \
            --parameters ${{ env.PARAMS }} \
            --parameters \
              dbAdminPassword="${{ secrets.DB_ADMIN_PASSWORD }}" \
              jwtKey="${{ secrets.JWT_KEY }}" \
              resendApiKey="${{ secrets.RESEND_API_KEY }}" \
              stripeSecretKey="${{ secrets.STRIPE_SECRET_KEY }}" \
              stripeWebhookSecret="${{ secrets.STRIPE_WEBHOOK_SECRET }}" \
            --deny-settings-mode denyDelete \
            --action-on-unmanage deleteResources \
            --yes

      - name: Show Stack Outputs
        run: |
          az stack group show \
            --name ${{ env.STACK_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "outputs" \
            --output table

  # ── Deploy to Production ────────────────────────────────────────────────────
  deploy-production:
    name: Deploy Stack (Production)
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_PROD }}

      - name: Install Bicep
        run: az bicep install

      - name: Deploy Stack
        run: |
          az stack group create \
            --name ${{ secrets.STACK_NAME_PROD }} \
            --resource-group ${{ secrets.RESOURCE_GROUP_PROD }} \
            --template-file ${{ env.TEMPLATE }} \
            --parameters ${{ env.PARAMS }} \
            --parameters \
              dbAdminPassword="${{ secrets.DB_ADMIN_PASSWORD_PROD }}" \
              jwtKey="${{ secrets.JWT_KEY_PROD }}" \
              resendApiKey="${{ secrets.RESEND_API_KEY_PROD }}" \
              stripeSecretKey="${{ secrets.STRIPE_SECRET_KEY_PROD }}" \
              stripeWebhookSecret="${{ secrets.STRIPE_WEBHOOK_SECRET_PROD }}" \
            --deny-settings-mode denyDelete \
            --action-on-unmanage deleteResources \
            --yes

      - name: Show Stack Outputs
        run: |
          az stack group show \
            --name ${{ secrets.STACK_NAME_PROD }} \
            --resource-group ${{ secrets.RESOURCE_GROUP_PROD }} \
            --query "outputs" \
            --output table